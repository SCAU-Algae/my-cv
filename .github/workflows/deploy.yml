name: deploy

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Resolve public site URL
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -f CNAME ] && [ -s CNAME ]; then
            echo "SITE_URL=https://$(tr -d '\n\r' < CNAME)" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${REPO_OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system fonts for CJK fallback
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install feedgen pyyaml

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Download fonts
        run: |
          mkdir -p fonts
          # Source Sans Pro (modern-cv body font)
          curl -sL "https://github.com/adobe-fonts/source-sans-pro/releases/download/3.006R/source-sans-pro-3.006R.zip" -o source-sans-pro.zip
          unzip -j -o source-sans-pro.zip "*.otf" -d fonts/
          # Roboto (modern-cv heading font)
          curl -sL "https://github.com/googlefonts/roboto-2/releases/download/v2.138/roboto-unhinted.zip" -o roboto.zip
          unzip -j -o roboto.zip "*.ttf" -d fonts/
          # Font Awesome 6 (icons)
          curl -sL "https://use.fontawesome.com/releases/v6.7.2/fontawesome-free-6.7.2-desktop.zip" -o fa.zip
          unzip -j -o fa.zip "*.otf" -d fonts/

      - name: Generate CV Typst source
        run: python generate_cv.py

      - name: Compile CV PDF
        run: typst compile cv.typ cv.pdf --font-path ./fonts

      - name: Build HTML Assets
        # Remove BASE_URL if using a custom domain (CNAME)
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Generate RSS and Atom feeds
        env:
          SITE_URL: ${{ env.SITE_URL }}
        run: python generate_rss.py

      - name: Rewrite localhost URLs in sitemap
        env:
          SITE_URL: ${{ env.SITE_URL }}
        run: |
          if [ -f ./_build/html/sitemap.xml ]; then
            sed -i "s|http://localhost:[0-9]*|${SITE_URL}|g" ./_build/html/sitemap.xml
          fi

      - name: Inject Giscus comments into blog posts
        run: python inject_comments.py

      - name: Copy static files and rewrite CV URL to stable path
        run: |
          if [ -f CNAME ] && [ -s CNAME ]; then
            cp CNAME ./_build/html/CNAME
          fi
          cp cv.pdf ./_build/html/cv.pdf
          # Rewrite hashed CV URL to stable /cv.pdf path
          find ./_build/html -name "*.html" -exec sed -i 's|/build/cv-[a-f0-9]\{20,\}\.pdf|/cv.pdf|g' {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
